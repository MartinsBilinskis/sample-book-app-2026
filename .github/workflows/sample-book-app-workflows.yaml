name: Sample Book App Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-install-deps:
    runs-on: self-hosted
    steps:
      - run: echo "Installing all necessary node dependencies.."
      - name: Install all dependencies
        run: npm install
      - run: echo "Dependency installation successful."
  deploy-dev:
    runs-on: self-hosted
    needs: build-install-deps
    steps:
      - name: Print step name
        run: echo "Deployment to DEV environment has started.."
      - name: Install dependencies
        run: npm install
      - name: Cleanup of old running services
        run:  '& ".\node_modules\.bin\pm2.cmd" delete "books-DEV"; if ($LASTEXITCODE -ne 0) { exit 0 }'
      - name: Run Service
        run:  .\node_modules\.bin\pm2.cmd start index.js --name "books-DEV" -- -- 1010

  test-dev:
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."
  deploy-stg:
    runs-on: self-hosted
    needs: test-dev
    steps:
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."
      - name: Cleanup of old running services
        run: '& ".\node_modules\.bin\pm2.cmd" delete "books-STG"; if ($LASTEXITCODE -ne 0) { exit 0 }'
      - name: Run Service
        run: .\node_modules\.bin\pm2.cmd start index.js --name "books-STG" -- -- 1010
  test-stg:
    runs-on: self-hosted
    needs: deploy-stg
    steps:
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."
  deploy-prd:
    runs-on: self-hosted
    needs: test-stg
    steps:
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."
      - name: Cleanup of old running services
        run: '& ".\node_modules\.bin\pm2.cmd" delete "books-PROD"; if ($LASTEXITCODE -ne 0) { exit 0 }'
      - name: Run Service
        run: .\node_modules\.bin\pm2.cmd start index.js --name "books-PROD" -- -- 1010
  test-prd:
    runs-on: self-hosted
    needs: deploy-prd
    steps:
      - name: Print step name
        run: echo "Installing all necessary node dependencies.."