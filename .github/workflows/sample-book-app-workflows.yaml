name: Sample Book App Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-install-deps:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/build

  deploy-dev:
    runs-on: self-hosted
    needs: build-install-deps
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/deploy
        with:
          environment: 'DEV'
          port: '1010'

  test-dev:
    runs-on: self-hosted
    needs: deploy-dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: 'MartinsBilinskis/RTU-sample-API-automation-2026-CI-DI'
          clean: 'false'
      - uses: ./.github/actions/test
        with:
          environment: 'DEV'
  deploy-stg:
    runs-on: self-hosted
    needs: test-dev
    steps:
      - uses: ./.github/actions/deploy
        with:
          environment: 'STG'
          port: '2020'

  test-stg:
    runs-on: self-hosted
    needs: deploy-stg
    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'MartinsBilinskis/RTU-sample-API-automation-2026-CI-DI'
          clean: 'false'
      - uses: ./.github/actions/test
        with:
          environment: 'DEV'
  deploy-prd:
    runs-on: self-hosted
    needs: test-stg
    steps:
      - uses: ./.github/actions/deploy
        with:
          environment: 'PROD'
          port: '3030'

  test-prd:
    runs-on: self-hosted
    needs: deploy-prd
    steps:
      - uses: actions/checkout@v6
        with:
          repository: 'MartinsBilinskis/RTU-sample-API-automation-2026-CI-DI'
          clean: 'false'
      - uses: ./.github/actions/test
        with:
          environment: 'DEV'
