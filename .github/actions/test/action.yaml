name: 'Run API test'
description: 'Run action test for sample book'
inputs:
  environment:
    description: 'Environment where to deploy Sample book'
    required: true
runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        repository: 'MartinsBilinskis/RTU-sample-API-automation-2026-CI-DI'
        clean: 'false'
        path: 'e2e-api-tests'
    - name: Print step name
      run: echo "Testing Sample Book Application service has started on ${{inputs.environment}} environment.."
      shell: pwsh
    - name: Install dependencies
      working-directory: ./e2e-api-test
      run: npm install
      shell: pwsh
    - name: Run API tests
      working-directory: ./e2e-api-tests
      run: npm run books BOOKS_${{inputs.environment}}
      shell: pwsh



